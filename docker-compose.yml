services:
  db:
    image: postgres:16-alpine
    container_name: azen-db
    environment:
      - POSTGRES_DB=azen
      - POSTGRES_USER=azen
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azen -d azen"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: azen-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azen-api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AuthDb=Host=db;Port=5432;Database=azen;Username=azen;Password=${POSTGRES_PASSWORD};
      - ConnectionStrings__AppDb=Host=db;Port=5432;Database=azen;Username=azen;Password=${POSTGRES_PASSWORD};
      - Storage__Endpoint=http://minio:9000
      - Storage__AccessKey=${MINIO_ACCESS_KEY}
      - Storage__SecretKey=${MINIO_SECRET_KEY}
      - Storage__BucketName=azen-documents
      - Storage__UseSSL=false
      - Jwt__Secret=${JWT_SECRET}
      - FeatureFlags__UseRealSMS=false
    ports:
      - "5010:8080"

volumes:
  postgres_data:
  minio_data:
